<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
 <style>#results{display: none;}</style>
    <title>Loan Calculator</title>
</head>
<body class="bg-dark">
    <div class="container">
        <div class="row ">
            <div class="col-md-6 mx-auto">
                <div class="card card-body text-center mt-5">
                    <h1 class="heading mt-3"> Loan Calculator</h1>
                    <form  id="loan-form">
                        <div class="form-group">
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <div class="input-group-text">$</div>
                                </div>
                                <input type="number" class="form-control" id="amount" placeholder="Loan Amount">
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <div class="input-group-text">%</div>
                                </div>
                                <input type="number" class="form-control" id="interest" placeholder="Interest Rate">
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <div class="input-group-text">Years</div>
                                </div>
                                <input type="number" class="form-control" id="years" placeholder="Number of Years">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-dark btn-block ">Calculate </button>
                    </form>
                    <div id="results" class="pt-3 pb-2 "> <h3 class="heading ">Results</h3>
                    <div class="form-group">
                            <div class="input-group" >
                                <div class="input-group-prepend">
                                    <div class="input-group-text">Monthly Payment</div>
                                </div>
                                <input type="number" class="form-control" id="monthly-payment" placeholder="" disabled>
                                
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <div class="input-group-text">Total Payment</div>
                                </div>
                                <input type="number" class="form-control" id="total-payment" placeholder="" disabled>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <div class="input-group-text">Total Interest</div>
                                </div>
                                <input type="number" class="form-control" id="total-interest" placeholder="" disabled>
                            </div>
                        </div>
                        </div>

                </div>
            </div>

        </div>

    </div>
    <script src="app.js"></script>
    
</body>
</html>
